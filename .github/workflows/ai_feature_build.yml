name: AI Feature Build (Test APK)

on:
  workflow_dispatch:
    inputs:
      feature_name:
        description: 'Feature name'
        required: true
        default: 'AI-Feature'

jobs:
  build:
    name: Build AI APK
    runs-on: ubuntu-latest

    env:
      _JAVA_OPTIONS: "-Xmx5g"
      GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx5g -Dorg.gradle.workers.max=4 -Dorg.gradle.parallel=true -Dorg.gradle.caching=true"

    steps:
      - name: Скачиваем код (Checkout)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Настраиваем Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Настраиваем Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          cache-read-only: false

      - name: Настраиваем проект (applicationId, Firebase)
        run: |
          sed -i 's/applicationId "org.DanVexTeam.NeoCatroid"/applicationId "org.DanVexTeam.NeoCatroid.aitest"/g' catroid/build.gradle
          find . -name "google-services*.json" -exec sed -i 's/"org.DanVexTeam.NeoCatroid"/"org.DanVexTeam.NeoCatroid.aitest"/g' {} +
          find catroid/src -type f -name "*.java" -exec sed -i 's/com.pdrogfer.mididroid/com.leff.midi/g' {} +
          find catroid/src -type f -name "*.java" -exec sed -i 's/com.oliewa92.mididroid/com.leff.midi/g' {} +
          echo "Пакет и зависимости настроены"

      - name: Даем права на исполнение Gradle
        run: chmod +x ./gradlew

      - name: Компилируем APK (Danvex Debug)
        run: ./gradlew assembleDanvexDebug --build-cache --parallel -x lint -x test --stacktrace

      - name: Загружаем готовый APK в Artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: NeoCatroid-${{ github.event.inputs.feature_name }}
          path: '**/build/outputs/apk/danvex/debug/*.apk'
          retention-days: 7
